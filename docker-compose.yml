services:
  omni-ocr-api:
    build: .
    ports:
      - "9125:9125"
    environment:
      - DEFAULT_LANG=korean
      - PRELOAD_LANGS=korean,en
      - OCR_WORKERS=2
      - DEBUG=false
      - FLAGS_use_mkldnn=0  # oneDNN 비활성화 (ConvertPirAttribute2RuntimeAttribute 에러 방지)
    volumes:
      # PaddleOCR 모델 캐시 유지 (재시작 시 재다운로드 방지)
      - paddleocr-models:/root/.paddlex
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9125/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # 모델 로딩 시간 고려 (최초 다운로드 ~90s + 여유)

volumes:
  paddleocr-models:
